name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # Use `npm install` rather than `npm ci` because the package-lock.json
      # is generated on macOS arm64 and omits Linux-only optional deps
      # (e.g. @emnapi/core). `npm install` resolves the missing platform deps
      # at CI time without requiring a cross-platform lockfile.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke-test the built binary
        run: node dist/cli.js --version
